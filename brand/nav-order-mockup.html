<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet"/>
<title>Nav order mock</title>
<style>
 :root{--primary:#1F3A5C;--accent:#C9923B}
 *{box-sizing:border-box}body{margin:0;font-family:"Inter",system-ui,sans-serif;background:#0f1a26;padding:2rem}
 h2{color:#9fb0c4;font-size:.85rem;margin:0 0 .5rem}
 .nav{background:var(--primary);color:#fff;display:flex;align-items:center;gap:1rem;padding:1rem 1.3rem;border-bottom:3px solid var(--accent);border-radius:8px}
 .brand{display:flex;align-items:center;gap:.5rem;font-weight:800;font-family:"Plus Jakarta Sans"}
 .brand .logo{width:34px;height:34px;border-radius:7px;background:linear-gradient(135deg,#caa24a,#6a4e12);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#1a1a1a;font-weight:800}
 .right{margin-left:auto;display:flex;align-items:center;gap:1.2rem}
 .right a{color:#fff;text-decoration:none;font-size:.95rem;font-weight:500}
 .call{display:inline-flex;align-items:center;gap:.4rem;background:var(--accent);color:#fff;font-weight:700;font-size:.85rem;padding:.5rem 1rem;border-radius:999px;text-decoration:none}
 .globe{display:inline-flex;background:transparent;border:0;cursor:pointer;color:#fff;padding:.3rem;border-radius:8px}
 .globe svg{width:1.3rem;height:1.3rem;stroke:#fff;fill:none;stroke-width:2}
</style></head><body>

 <h2>BEFORE</h2>
 <div class="nav" style="margin-bottom:1.6rem">
   <div class="brand"><span class="logo">SG</span> Stam</div>
   <div class="right">
     <a>Nekretnine</a><a>O nama</a><a>Kontakt</a>
     <button class="globe"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18"/></svg></button>
     <a class="call">📞 Pozovite nas</a>
   </div>
 </div>

 <h2>AFTER — Properties · About Us · Call Us · Globe (Contact removed, globe last)</h2>
 <div class="nav">
   <div class="brand"><span class="logo">SG</span> Stam</div>
   <div class="right">
     <a>Nekretnine</a><a>O nama</a>
     <a class="call">📞 Pozovite nas</a>
     <button class="globe" title="Language"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18"/></svg></button>
   </div>
 </div>

</body></html>
